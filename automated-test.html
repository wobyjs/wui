<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Test: Editor Demo Verification</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-result {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .pass { background: #d4edda; border-color: #c3e6cb; }
        .fail { background: #f8d7da; border-color: #f5c6cb; }
        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Automated Test: Editor Demo Verification</h1>

    <div id="results"></div>

    <wui-editor enableToolbar="true" id="test-editor">
        <p>Test paragraph one</p>
        <p>Test paragraph two</p>
        <p><strong>Bold text</strong> for testing</p>
    </wui-editor>

    <script type="module">
        import './src/index.tsx'

        await customElements.whenDefined('wui-editor')

        const resultsDiv = document.getElementById('results')
        const editor = document.getElementById('test-editor')
        const tests = []

        function addTest(name, passed, details = '') {
            const div = document.createElement('div')
            div.className = `test-result ${passed ? 'pass' : 'fail'}`
            const text = `${passed ? '✓' : '✗'} ${name}${details ? ` - ${details}` : ''}`
            div.textContent = text
            resultsDiv.appendChild(div)
            tests.push({ name, passed })
        }

        // Test 1: Custom element defined
        addTest('Custom element defined', customElements.get('wui-editor') !== undefined)

        // Test 2: Editor rendered
        addTest('Editor element exists', editor !== null)

        // Test 3: Shadow DOM attached
        setTimeout(() => {
            const hasShadow = editor.shadowRoot !== null
            addTest('Shadow DOM attached', hasShadow)

            if (hasShadow) {
                // Test 4: Editor div (contentEditable) exists in shadow
                const editorDiv = editor.shadowRoot.querySelector('[data-editor-root]')
                addTest('Editor div (contentEditable) exists', editorDiv !== null)

                if (editorDiv) {
                    // Test 5: contentEditable attribute
                    const editable = editorDiv.getAttribute('contenteditable')
                    addTest('contentEditable attribute present', editable !== null,
                        `value: ${editable}`)

                    // Test 6: computedStyle - can check styling
                    const computedStyle = window.getComputedStyle(editorDiv)
                    addTest('Computed style accessible', computedStyle !== null,
                        `outline: ${computedStyle.outline}`)

                    // Test 7: Initial content (light DOM slotted)
                    const slot = editor.shadowRoot.querySelector('slot')
                    addTest('Slot element exists', slot !== null)

                    if (slot) {
                        const assignedNodes = slot.assignedNodes()
                        addTest('Light DOM content slotted', assignedNodes.length > 0,
                            `${assignedNodes.length} nodes`)
                    }

                    // Test 8: Click to activate editing
                    console.log('[Test] Simulating click on editor...')
                    editorDiv.click()

                    setTimeout(() => {
                        const isEditing = editorDiv.getAttribute('contenteditable')
                        addTest('Click activates editing', isEditing === 'true',
                            `contenteditable after click: ${isEditing}`)

                        // Test 9: Selection API works
                        const sel = window.getSelection()
                        addTest('Selection API available', sel !== null,
                            `rangeCount: ${sel?.rangeCount}`)

                        // Test 10: Toolbar buttons rendered
                        const toolbar = editor.shadowRoot.querySelector('.editor-toolbar')
                        addTest('Toolbar rendered', toolbar !== null)

                        if (toolbar) {
                            const buttons = toolbar.querySelectorAll('button')
                            addTest('Toolbar buttons exist', buttons.length > 0,
                                `${buttons.length} buttons`)
                        }

                        // Summary
                        const passed = tests.filter(t => t.passed).length
                        const total = tests.length
                        const summaryDiv = document.createElement('div')
                        summaryDiv.className = `test-result ${passed === total ? 'pass' : 'fail'}`
                        summaryDiv.textContent = `Summary: ${passed}/${total} tests passed`
                        resultsDiv.appendChild(summaryDiv)

                        console.log(`[Test Complete] ${passed}/${total} tests passed`)
                    }, 100)
                }
            }
        }, 500)

        console.log('[Automated Test] Starting tests...')
    </script>
</body>
</html>
