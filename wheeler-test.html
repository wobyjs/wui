<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheeler Test</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 40px; background: #f5f5f5; max-width: 600px; margin: 0 auto; }
        .container { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wheeler Test</h1>
        <p>Testing <code>wui-wheeler</code> and <code>wui-datetime-wheeler</code></p>

        <div><strong>wui-wheeler:</strong></div>
        <wui-wheeler id="wheeler1" visible="true"></wui-wheeler>
        
        <div style="margin-top:20px"><strong>wui-datetime-wheeler:</strong></div>
        <wui-datetime-wheeler id="wheeler2" visible="true" mode="datetime"></wui-datetime-wheeler>
    </div>

    <script type="module">
        import '/src/index.tsx'
        
        setTimeout(async () => {
            for (const tag of ['wui-wheeler', 'wui-datetime-wheeler']) {
                const defined = customElements.get(tag) !== undefined
                const el = document.querySelector(tag)
                const shadow = el?.shadowRoot ? 'YES' : 'NO'
                const html = el?.shadowRoot?.innerHTML?.substring(0, 200) || 'N/A'
                console.log(tag + ': defined=' + defined + ' shadow=' + shadow + ' html=' + html)
            }
        }, 2000)
    </script>
</body>
</html>
