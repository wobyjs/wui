<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Blur Test - Standalone</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px;
            background: #f0f0f0;
        }
        wui-editor {
            display: block;
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        #log {
            background: #1e1e1e;
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 4px;
            font-size: 11px;
            line-height: 1.4;
            max-height: 400px;
            overflow-y: auto;
        }
        .entry {
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
        }
        .blur { color: #f44; font-weight: bold; }
        .focus { color: #4f4; }
        .selection { color: #44f; }
        .click { color: #ff4; }
    </style>
</head>
<body>
    <h1>Editor Blur Behavior Test</h1>
    <p>Testing if clicking toolbar buttons causes selection loss</p>

    <wui-editor id="test-editor" enableToolbar="true">
        <p>Welcome to the WUI Rich Text Editor!</p>
        <p>This tests blur behavior when clicking toolbar buttons.</p>
        <p>Select text and click formatting buttons to see what happens.</p>
    </wui-editor>

    <h2>Event Log</h2>
    <div id="log"></div>

    <script type="module">
        import { Editor } from './src/Editor/index.ts';

        // Wait for custom element to be defined
        await customElements.whenDefined('wui-editor');

        const editor = document.getElementById('test-editor');
        const log = document.getElementById('log');

        let logId = 0;

        function addEntry(msg, type = '') {
            const div = document.createElement('div');
            div.className = `entry ${type}`;
            const time = new Date().toISOString().substr(11, 12);
            div.textContent = `[${time}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        // Wait for shadow DOM
        await new Promise(resolve => {
            const check = () => {
                if (editor.shadowRoot?.querySelector('[data-editor-root]')) {
                    resolve();
                } else {
                    setTimeout(check, 50);
                }
            };
            check();
        });

        addEntry('Editor initialized ✓', 'focus');

        const shadow = editor.shadowRoot;
        const editable = shadow.querySelector('[data-editor-root]');
        const toolbar = shadow.querySelector('.editor-toolbar');

        // Monitor events
        ['blur', 'focus', 'focusin', 'focusout', 'mousedown', 'click'].forEach(evt => {
            editable.addEventListener(evt, e => {
                const sel = window.getSelection();
                addEntry(`${evt.toUpperCase()} @ editable | Sel: "${sel.toString()}" | Active: ${document.activeElement.tagName}`,
                    evt === 'blur' ? 'blur' : evt === 'focus' ? 'focus' : '');
            }, true);
        });

        // Monitor toolbar
        toolbar.addEventListener('mousedown', e => {
            addEntry(`MOUSEDOWN @ toolbar | Target: ${e.target.tagName}`, 'click');
        }, true);

        toolbar.addEventListener('click', e => {
            addEntry(`CLICK @ toolbar | Target: ${e.target.tagName}`, 'click');
        }, true);

        // Monitor selection changes
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            if (sel.toString()) {
                addEntry(`Selection: "${sel.toString()}"`, 'selection');
            }
        });

        addEntry('Event monitors attached ✓', 'focus');
        addEntry('Ready for testing - click in editor to start', 'focus');
    </script>
</body>
</html>
